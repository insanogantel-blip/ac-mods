<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AC MODS | Store</title>
    <style>
        :root { --blue: #007bff; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* PANTALLA DE CARGA - REFORMADA */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--blue);
            display: none; /* Inicia oculto */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        /* SIDEBAR */
        .sidebar { width: 250px; background: #000b1a; border-right: 2px solid var(--blue); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .sidebar h1 { color: var(--blue); text-align: center; font-size: 1.5rem; }
        .sidebar button { background: rgba(0,123,255,0.1); color: white; border: 1px solid var(--blue); padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; text-align: left; }
        .sidebar button.active { background: var(--blue); }

        /* CONTENIDO */
        .main-content { flex-grow: 1; padding: 40px; background: radial-gradient(circle at top right, #001a33, #050505); overflow-y: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; border: 1px solid #222; text-align: center; }
        .btn-buy { background: var(--blue); border: none; padding: 10px; width: 100%; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; border-radius: 5px; }

        /* MOUSE */
        #fire { position: fixed; width: 10px; height: 10px; background: var(--blue); border-radius: 50%; pointer-events: none; box-shadow: 0 0 15px var(--blue); z-index: 10001; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <div id="loader">
        <h1 style="font-size: 5rem; margin: 0;">[AC]</h1>
        <p style="letter-spacing: 5px;">CARGANDO ZONA...</p>
    </div>

    <div id="fire"></div>

    <div class="sidebar">
        <h1>AC MODS</h1>
        <button class="tab-link active" onclick="changeTab(this, 'gms')">GAMEMODES</button>
        <button class="tab-link" onclick="changeTab(this, 'skins')">SKINS</button>
        <button class="tab-link" onclick="changeTab(this, 'maps')">MAPAS</button>
        <button class="tab-link" onclick="changeTab(this, 'soporte')">SOPORTE</button>
    </div>

    <div class="main-content">
        <div id="gms" class="tab-content active">
            <h2>CATEGORIA: GAMEMODES</h2>
            <div class="card">
                <h3>GM ROLEPLAY PROFESIONAL</h3>
                <button class="btn-buy" onclick="window.open('https://discord.gg/wq44EuJcp3')">COMPRAR</button>
            </div>
        </div>

        <div id="skins" class="tab-content"><h2>CATEGORIA: SKINS</h2></div>
        <div id="maps" class="tab-content"><h2>CATEGORIA: MAPAS</h2></div>
        <div id="soporte" class="tab-content"><h2>SOPORTE TECNICO</h2></div>
    </div>

    <script>
        // Seguimiento de mouse
        const fire = document.getElementById('fire');
        document.addEventListener('mousemove', (e) => {
            fire.style.left = e.clientX + 'px';
            fire.style.top = e.clientY + 'px';
        });

        // FUNCIÓN DEFINITIVA PARA CAMBIAR PESTAÑAS
        function changeTab(btn, tabId) {
            const loader = document.getElementById('loader');
            
            // 1. Mostrar el cargador
            loader.style.display = 'flex';

            // 2. Esperar 500ms y hacer el cambio
            setTimeout(() => {
                // Quitar 'active' de todos los contenidos
                document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
                // Quitar 'active' de todos los botones
                document.querySelectorAll('.tab-link').forEach(link => link.classList.remove('active'));

                // Activar el nuevo contenido
                document.getElementById(tabId).classList.add('active');
                // Activar el nuevo botón
                btn.classList.add('active');

                // 3. ¡MUY IMPORTANTE! Apagar el cargador
                loader.style.display = 'none';

            }, 500); 
        }
    </script>
</body>
</html>
