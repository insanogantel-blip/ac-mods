<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AC MODS | Tienda Oficial</title>
    <style>
        /* CONFIGURACIÓN BASE */
        body {
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* BARRA LATERAL (PC) */
        .sidebar {
            width: 240px;
            background-color: #000b1a;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-right: 2px solid #007bff;
            flex-shrink: 0;
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.5);
        }

        .sidebar h1 {
            color: #007bff;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 0 10px #007bff;
            letter-spacing: 2px;
        }

        .sidebar button {
            background: rgba(0, 123, 255, 0.05);
            color: #cbd5e0;
            border: 1px solid #004a99;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-align: left;
        }

        .sidebar button:hover {
            background: #007bff;
            color: white;
            transform: translateX(8px);
        }

        /* CONTENIDO PRINCIPAL */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            background: radial-gradient(circle at top right, #001a33 0%, #050505 100%);
            scroll-behavior: smooth;
        }

        /* APARTADO OWNERS */
        .section-owners {
            background: rgba(0, 123, 255, 0.07);
            border: 1px solid #007bff;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 50px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .owner-names {
            font-size: 2.2rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* SECCIONES */
        .product-section { margin-bottom: 60px; }
        .product-section h2 {
            border-left: 6px solid #007bff;
            padding-left: 15px;
            color: #00a2ff;
            text-transform: uppercase;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
        }

        .card {
            background: rgba(15, 15, 15, 0.8);
            border: 1px solid #222;
            border-radius: 15px;
            padding: 25px;
            transition: 0.4s;
            text-align: center;
        }

        .card:hover {
            border-color: #007bff;
            transform: translateY(-10px);
        }

        .btn-buy {
            background: #007bff;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-buy:hover { background: #00ff88; color: #000; box-shadow: 0 0 15px #00ff88; }

        /* REPRODUCTOR */
        .music-player {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: rgba(0, 11, 26, 0.95);
            border: 1px solid #007bff;
            padding: 15px;
            border-radius: 20px;
            z-index: 9999;
            text-align: center;
        }

        audio { height: 35px; width: 220px; }

        /* AJUSTES PARA MÓVIL */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { 
                width: 100%; 
                height: auto; 
                flex-direction: row; 
                overflow-x: auto; 
                padding: 10px; 
                border-right: none; 
                border-bottom: 2px solid #007bff;
            }
            .sidebar h1 { display: none; }
            .sidebar button { padding: 8px 12px; font-size: 0.7rem; white-space: nowrap; }
            .main-content { height: auto; padding: 20px; }
            .owner-names { font-size: 1.5rem; }
            .music-player { width: 80%; left: 10%; right: 10%; bottom: 10px; padding: 10px; }
            audio { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>AC MODS</h1>
        <button onclick="document.getElementById('gms').scrollIntoView({behavior: 'smooth'})">GAMEMODES</button>
        <button onclick="document.getElementById('skins').scrollIntoView({behavior: 'smooth'})">SKINS</button>
        <button onclick="document.getElementById('maps').scrollIntoView({behavior: 'smooth'})">MAPAS</button>
    </div>

    <div class="main-content">
        <div class="section-owners">
            <h2 style="color:#007bff; font-size: 0.8rem; letter-spacing: 3px;">OWNERS & MANAGEMENT</h2>
            <div class="owner-names">ARIEL & ALEJANDRO</div>
        </div>

        <div id="gms" class="product-section">
            <h2>Apartado: Gamemodes</h2>
            <div class="grid">
                <div class="card">
                    <h3>GM ROLEPLAY Y GM ZONES</h3>
                    <p style="color:#666">Base optimizada 0.3.7. Nosotros mismos te la instalamos.</p>
                    <button class="btn-buy" onclick="window.open('https://discord.gg/wq44EuJcp3', '_blank')">Comprar Ahora</button>
                </div>
            </div>
        </div>

        <div id="skins" class="product-section">
            <h2>Apartado: Skins</h2>
            <div class="grid">
                <div class="card">
                    <h3>SKIN EXCLUSIVO</h3>
                    <p style="color:#666">Skin Personalizada al Gusto.</p>
                    <button class="btn-buy" onclick="window.open('https://discord.gg/wq44EuJcp3', '_blank')">Comprar Ahora</button>
                </div>
            </div>
        </div>

        <div id="maps" class="product-section">
            <h2>Apartado: Mapas</h2>
            <div class="grid">
                <div class="card">
                    <h3>MAPEOS UNICOS Y EXCLUSIVOS</h3>
                    <p style="color:#666">Mapeo único sin lag.</p>
                    <button class="btn-buy" onclick="window.open('https://discord.gg/wq44EuJcp3', '_blank')">Comprar Ahora</button>
                </div>
            </div>
        </div>
    </div>

    <div class="music-player">
        <p style="margin:0 0 10px 0; font-size: 10px; color:#007bff;">🎵 AC MODS RADIO</p>
        <audio id="bg-music" controls loop>
            <source src="https://files.catbox.moe/dzta7y.mp4" type="audio/mpeg">
            Tu navegador no soporta audio.
        </audio>
    </div>

</body>
</html>
